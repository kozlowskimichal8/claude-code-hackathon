services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: "NWL_Dev_2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        - "CMD"
        - "/bin/bash"
        - "-c"
        - >
          /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "NWL_Dev_2024!" -Q "SELECT 1" -b -C 2>/dev/null ||
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "NWL_Dev_2024!" -Q "SELECT 1" -b -C 2>/dev/null
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2019-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SA_PASSWORD: "NWL_Dev_2024!"
      DB_HOST: "sqlserver"
    volumes:
      - ./lagacy/database:/scripts:ro
      - ./docker:/init:ro
    entrypoint: ["/bin/bash", "/init/init-db.sh"]
    restart: "no"
